<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1625">
<title>Timer FBE</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #1a1625;
    --surface: #241e32;
    --surface-2: #2d2540;
    --purple: #a78bfa;
    --purple-soft: #c4b5fd;
    --purple-deep: #7c3aed;
    --gray: #9ca3af;
    --gray-soft: #d1d5db;
    --text: #f3f4f6;
    --success: #34d399;
    --danger: #f87171;
  }
  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow-y: auto;
    user-select: none;
    -webkit-user-select: none;
  }
  .app {
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    min-height: 100%;
    padding: 20px 16px 28px;
    gap: 18px;
  }
  .header {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    margin-top: 4px;
  }
  .logo {
    height: 56px;
    width: 56px;
    border-radius: 50%;
    padding: 2px;
    background: linear-gradient(135deg, var(--purple-deep), var(--purple));
    box-shadow: 0 4px 20px rgba(124, 58, 237, 0.35), 0 0 0 1px rgba(167, 139, 250, 0.3);
    object-fit: cover;
  }
  .brand {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--gray);
    text-transform: uppercase;
    font-weight: 600;
  }
  .ring-container {
    position: relative;
    width: min(240px, 62vw);
    height: min(240px, 62vw);
  }
  .ring-svg {
    transform: rotate(-90deg);
    width: 100%;
    height: 100%;
  }
  .ring-bg { stroke: var(--surface-2); }
  .ring-fg {
    stroke: var(--purple);
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear, stroke 0.3s ease;
  }
  .ring-fg.warning { stroke: #fbbf24; }
  .ring-fg.danger { stroke: var(--danger); }
  .ring-fg.done { stroke: var(--success); }
  .time {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 4px;
  }
  .time-main {
    font-size: clamp(44px, 12vw, 64px);
    font-weight: 200;
    font-variant-numeric: tabular-nums;
    letter-spacing: -2px;
    color: var(--text);
  }
  .time-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--gray);
    text-transform: uppercase;
  }
  .series-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    width: min(360px, 90vw);
    padding: 14px 18px;
    background: var(--surface);
    border-radius: 16px;
    border: 1px solid var(--surface-2);
  }
  .series-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--gray);
    text-transform: uppercase;
    font-weight: 600;
  }
  .series-counter {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .series-btn {
    width: 40px;
    height: 40px;
    background: var(--surface-2);
    border: none;
    border-radius: 50%;
    color: var(--purple-soft);
    font-size: 22px;
    font-weight: 400;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    font-family: inherit;
    line-height: 1;
  }
  .series-btn:hover { background: var(--purple-deep); color: white; }
  .series-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .series-btn:disabled:hover { background: var(--surface-2); color: var(--purple-soft); }
  .series-display {
    font-size: 28px;
    font-weight: 300;
    font-variant-numeric: tabular-nums;
    min-width: 90px;
    text-align: center;
    letter-spacing: 1px;
  }
  .series-display .current { color: var(--text); font-weight: 500; }
  .series-display .sep { color: var(--gray); margin: 0 4px; }
  .series-display .total { color: var(--gray); }
  .series-display.done .current { color: var(--success); }
  .grid-section {
    width: min(360px, 90vw);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .grid-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--gray);
    text-transform: uppercase;
    font-weight: 600;
    padding: 0 4px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .chip {
    background: var(--surface);
    border: 1px solid transparent;
    color: var(--gray-soft);
    padding: 12px 8px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
  }
  .chip:hover { background: var(--surface-2); color: var(--text); }
  .chip.active {
    background: var(--purple-deep);
    color: white;
    border-color: var(--purple);
    box-shadow: 0 0 16px rgba(124, 58, 237, 0.35);
  }
  .controls {
    display: flex;
    gap: 10px;
    width: min(360px, 90vw);
  }
  .btn-main {
    flex: 1;
    padding: 17px;
    background: var(--purple-deep);
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
    text-transform: uppercase;
  }
  .btn-main:hover { background: var(--purple); transform: translateY(-1px); }
  .btn-main:active { transform: translateY(0); }
  .btn-main.pause { background: var(--surface-2); color: var(--purple-soft); }
  .btn-reset {
    padding: 17px 20px;
    background: transparent;
    color: var(--gray);
    border: 1px solid var(--surface-2);
    border-radius: 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
  }
  .btn-reset:hover { color: var(--text); border-color: var(--gray); }
  .footer {
    font-size: 9px;
    color: var(--gray);
    letter-spacing: 1px;
    opacity: 0.5;
    text-align: center;
    margin-top: 4px;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.03); }
  }
  @keyframes success-glow {
    0% { box-shadow: 0 0 0 rgba(52, 211, 153, 0); }
    50% { box-shadow: 0 0 40px rgba(52, 211, 153, 0.5); }
    100% { box-shadow: 0 0 0 rgba(52, 211, 153, 0); }
  }
  .time-main.pulsing { animation: pulse 1s ease-in-out infinite; color: var(--success); }
  .series-box.complete { animation: success-glow 1.5s ease; border-color: var(--success); }
  .sound-row {
    display: flex;
    gap: 8px;
    align-items: stretch;
  }
  .sound-select {
    flex: 1;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--surface-2);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 14px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    -webkit-appearance: none;
    -moz-appearance: none;
    appearance: none;
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%239ca3af' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: right 12px center;
    background-size: 14px;
    padding-right: 36px;
    transition: all 0.2s ease;
  }
  .sound-select:hover { background-color: var(--surface-2); border-color: var(--purple); }
  .sound-select:focus { outline: none; border-color: var(--purple); }
  .sound-test {
    width: 46px;
    background: var(--purple-deep);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .sound-test:hover { background: var(--purple); }
  .sound-test:active { transform: scale(0.95); }
  .sound-test.playing { background: var(--success); }
</style>

  const audioElements = {};
  function getAudio(key) {
    if (!audioElements[key]) {
      audioElements[key] = new Audio(SOUNDS[key]);
      audioElements[key].preload = 'auto';
    }
    return audioElements[key];
  }

  function playSound(key) {
    try {
      const a = getAudio(key);
      a.currentTime = 0;
      a.play().catch(() => {});
    } catch(e) {}
  }

  const CIRCUMFERENCE = 2 * Math.PI * 92;
  const display = document.getElementById('display');
  const label = document.getElementById('label');
  const ring = document.getElementById('ring');
  const startBtn = document.getElementById('startBtn');
  const resetBtn = document.getElementById('resetBtn');
  const timePresets = document.querySelectorAll('#timePresets .chip');
  const seriesPresets = document.querySelectorAll('#seriesPresets .chip');
  const minusBtn = document.getElementById('minusBtn');
  const plusBtn = document.getElementById('plusBtn');
  const seriesDisplay = document.getElementById('seriesDisplay');
  const seriesBox = document.getElementById('seriesBox');
  const seriesLabel = document.getElementById('seriesLabel');

  let totalSec = 90;
  let remaining = 90;
  let running = false;
  let interval = null;
  let audioCtx = null;
  let currentSeries = 1;
  let totalSeries = 4;
  let exerciseComplete = false;
  let currentSound = localStorage.getItem('fbe-timer-sound') || 'tres-beeps';

  ring.setAttribute('stroke-dasharray', CIRCUMFERENCE);
  ring.setAttribute('stroke-dashoffset', 0);

  function format(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return `${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
  }

  function updateRing() {
    const progress = remaining / totalSec;
    const offset = CIRCUMFERENCE * (1 - progress);
    ring.setAttribute('stroke-dashoffset', offset);
    ring.classList.remove('warning', 'danger', 'done');
    if (remaining === 0) ring.classList.add('done');
    else if (remaining <= 3) ring.classList.add('danger');
    else if (remaining <= 10) ring.classList.add('warning');
  }

  function updateDisplay() {
    display.textContent = format(remaining);
    updateRing();
  }

  function updateSeriesDisplay() {
    seriesDisplay.innerHTML = `<span class="current">${currentSeries}</span><span class="sep">/</span><span class="total">${totalSeries}</span>`;
    seriesDisplay.classList.toggle('done', exerciseComplete);
    minusBtn.disabled = currentSeries <= 1 || running;
    plusBtn.disabled = currentSeries >= totalSeries || running;
    seriesLabel.textContent = exerciseComplete ? 'Ejercicio completado' : 'Serie en curso';
  }

  function beep(freq = 880, duration = 150, volume = 0.3) {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch(e) { return; }
    }
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = freq;
    osc.type = 'sine';
    gain.gain.setValueAtTime(volume, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration / 1000);
    osc.start();
    osc.stop(audioCtx.currentTime + duration / 1000);
  }

  function vibrate(pattern) {
    if (navigator.vibrate) navigator.vibrate(pattern);
  }

  function advanceSeries() {
    if (currentSeries < totalSeries) {
      currentSeries++;
      if (currentSeries === totalSeries) {
        // Llegamos a la última serie (que aún falta por hacer)
        // El "completado" se dispara al acabar el descanso DE la última serie
      }
    } else {
      // Ya estábamos en la última, ahora se considera completado
      exerciseComplete = true;
      seriesBox.classList.add('complete');
      vibrate(200); // suave, sin bips
      setTimeout(() => seriesBox.classList.remove('complete'), 1500);
    }
    updateSeriesDisplay();
  }

  function finish() {
    clearInterval(interval);
    running = false;
    label.textContent = '¡Listo!';
    display.classList.add('pulsing');
    startBtn.textContent = 'Iniciar';
    startBtn.classList.remove('pause');
    // Reproducir sonido seleccionado + vibración
    playSound(currentSound);
    vibrate([200, 100, 200, 100, 400]);
    // Avanzar la serie
    advanceSeries();
  }

  function tick() {
    remaining--;
    if (remaining <= 3 && remaining > 0) {
      beep(660, 100, 0.25);
      vibrate(80);
    }
    updateDisplay();
    if (remaining <= 0) finish();
  }

  function start() {
    if (remaining <= 0) remaining = totalSec;
    if (exerciseComplete) {
      // Reiniciamos el ejercicio si ya estaba terminado
      currentSeries = 1;
      exerciseComplete = false;
      updateSeriesDisplay();
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    else if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
    }
    running = true;
    label.textContent = 'Descanso';
    display.classList.remove('pulsing');
    startBtn.textContent = 'Pausar';
    startBtn.classList.add('pause');
    updateSeriesDisplay();
    interval = setInterval(tick, 1000);
  }

  function pause() {
    clearInterval(interval);
    running = false;
    startBtn.textContent = 'Reanudar';
    startBtn.classList.remove('pause');
    updateSeriesDisplay();
  }

  function reset() {
    clearInterval(interval);
    running = false;
    remaining = totalSec;
    currentSeries = 1;
    exerciseComplete = false;
    label.textContent = 'Descanso';
    display.classList.remove('pulsing');
    startBtn.textContent = 'Iniciar';
    startBtn.classList.remove('pause');
    updateDisplay();
    updateSeriesDisplay();
  }

  startBtn.addEventListener('click', () => {
    if (running) pause();
    else start();
  });

  resetBtn.addEventListener('click', reset);

  timePresets.forEach(btn => {
    btn.addEventListener('click', () => {
      timePresets.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      totalSec = parseInt(btn.dataset.seconds);
      remaining = totalSec;
      exerciseComplete = false;
      clearInterval(interval);
      running = false;
      label.textContent = 'Descanso';
      display.classList.remove('pulsing');
      startBtn.textContent = 'Iniciar';
      startBtn.classList.remove('pause');
      updateDisplay();
      updateSeriesDisplay();
    });
  });

  seriesPresets.forEach(btn => {
    btn.addEventListener('click', () => {
      seriesPresets.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      totalSeries = parseInt(btn.dataset.series);
      if (currentSeries > totalSeries) currentSeries = totalSeries;
      exerciseComplete = false;
      updateSeriesDisplay();
    });
  });

  minusBtn.addEventListener('click', () => {
    if (currentSeries > 1 && !running) {
      currentSeries--;
      exerciseComplete = false;
      updateSeriesDisplay();
    }
  });

  plusBtn.addEventListener('click', () => {
    if (currentSeries < totalSeries && !running) {
      currentSeries++;
      if (currentSeries === totalSeries) {
        // Marcar como completado manualmente también
        exerciseComplete = true;
        seriesBox.classList.add('complete');
        vibrate(200);
        setTimeout(() => seriesBox.classList.remove('complete'), 1500);
      }
      updateSeriesDisplay();
    }
  });

  // Wake lock para mantener pantalla encendida
  if ('wakeLock' in navigator) {
    let wakeLock = null;
    const requestWakeLock = async () => {
      try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
    };
    document.addEventListener('click', requestWakeLock, { once: true });
  }

  // Selector de sonido
  const soundSelect = document.getElementById('soundSelect');
  const testBtn = document.getElementById('testBtn');
  
  soundSelect.value = currentSound;
  
  soundSelect.addEventListener('change', (e) => {
    currentSound = e.target.value;
    localStorage.setItem('fbe-timer-sound', currentSound);
  });
  
  testBtn.addEventListener('click', () => {
    playSound(currentSound);
    testBtn.classList.add('playing');
    setTimeout(() => testBtn.classList.remove('playing'), 400);
  });

  updateDisplay();
  updateSeriesDisplay();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(err => console.log('SW error:', err));
  });
}
</script>
